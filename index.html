<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Motore AI Remoto</title>
</head>
<body>
    <h1>Motore AI Attivo</h1>
    <p id="status">Stato: Inizializzazione in corso (caricamento pesi remoti)...</p>

    <div id="test-interface">
        <textarea id="input-text" placeholder="Scrivi una frase..."></textarea>
        <button id="btn-analyze" disabled>Analizza</button>
        <pre id="output"></pre>
    </div>

    <script type="module">
        // Importiamo env per gestire le configurazioni di rete
        import { env, pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // CONFIGURAZIONE: Impediamo la ricerca di file locali
        env.allowLocalModels = false;
        env.useBrowserCache = true; // Sfruttiamo la cache del browser dopo il 1° download

        const status = document.getElementById('status');
        const btn = document.getElementById('btn-analyze');
        const input = document.getElementById('input-text');
        const output = document.getElementById('output');

        let classifier;

        async function init() {
            try {
                // Caricamento dal repository ufficiale (non cercare file locali)
                classifier = await pipeline('sentiment-analysis', 'Xenova/distilbert-base-uncased-finetuned-sst-2-english');
                
                status.innerText = "Stato: Modello caricato! Pronto.";
                btn.disabled = false;
                console.log("Motore pronto.");
            } catch (err) {
                status.innerText = "Errore durante il caricamento: " + err.message;
                console.error("Dettaglio:", err);
            }
        }

        // Analisi tramite interfaccia interna
        async function runAnalysis() {
            const text = input.value;
            if (!text || !classifier) return;
            
            output.innerText = "Analisi in corso...";
            const result = await classifier(text);
            output.innerText = JSON.stringify(result, null, 2);
        }

        btn.addEventListener('click', runAnalysis);

        // PONTE: Comunicazione con l'estensione
        window.addEventListener('message', async (event) => {
            // Verifica che il messaggio contenga il testo e il modello sia pronto
            if (event.data && event.data.text && classifier) {
                try {
                    const result = await classifier(event.data.text);
                    // Rispondi al mittente (l'estensione)
                    event.source.postMessage({ 
                        result: result, 
                        requestId: event.data.requestId 
                    }, event.origin);
                } catch (err) {
                    event.source.postMessage({ error: err.message }, event.origin);
                }
            }
        });

        init();
    </script>
</body>
</html>
