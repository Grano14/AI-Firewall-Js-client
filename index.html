<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Motore AI - Anonimizzazione</title>
</head>
<body>
    <h1>Motore AI Attivo</h1>
    <p id="status">Stato: Inizializzazione modello NER...</p>
    <div id="test-interface">
        <textarea id="input-text" placeholder="Scrivi una frase..."></textarea>
        <button id="btn-analyze" disabled>Analizza</button>
        <pre id="output"></pre>
    </div>

    <script type="module">
        import { env, pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        const status = document.getElementById('status');
        const btn = document.getElementById('btn-analyze');
        const input = document.getElementById('input-text');
        const output = document.getElementById('output');
        let detector;

        async function init() {
            try {
                detector = await pipeline('token-classification', 'Xenova/bert-base-NER');
                status.innerText = "Stato: Modello NER caricato!";
                btn.disabled = false;
            } catch (err) { status.innerText = "Errore: " + err.message; }
        }

        async function runAnalysis() {
            const text = input.value;
            if (!text || !detector) return;
            
            // CORRETTO: aggregation_strategy con l'underscore
            const result = await detector(text, { aggregation_strategy: 'simple' });
            output.innerText = JSON.stringify(result, null, 2);
        }

        btn.addEventListener('click', runAnalysis);

        // Ascolta i messaggi inviati dall'estensione Chrome
        window.addEventListener('message', async (event) => {
            if (event.data && event.data.text && detector) {
                try {
                    // CORRETTO: aggregation_strategy anche qui per le richieste dell'estensione
                    const result = await detector(event.data.text, { aggregation_strategy: 'simple' });
                    
                    // Risponde al popup inviando il risultato aggregato pulito
                    event.source.postMessage({ result, requestId: event.data.requestId }, event.origin);
                } catch (err) { 
                    event.source.postMessage({ error: err.message }, event.origin); 
                }
            }
        });
        
        init();
    </script>
</body>
</html>
